# Shadowrocket config aligned to surge.conf

[General]
bypass-system = true
skip-proxy = localhost,*.local,captive.apple.com,guzzoni.apple.com,passenger.t3go.cn,wxh.wo.cn,0.0.0.0/8,10.0.0.0/8,17.0.0.0/8,100.64.0.0/10,127.0.0.0/8,169.254.0.0/16,172.16.0.0/12,192.0.0.0/24,192.0.2.0/24,192.168.0.0/16,192.88.99.0/24,198.18.0.0/15,198.51.100.0/24,203.0.113.0/24,224.0.0.0/4,240.0.0.0/4,255.255.255.255/32
tun-excluded-routes = 10.0.0.0/8,17.0.0.0/8,100.64.0.0/10,127.0.0.0/8,169.254.0.0/16,172.16.0.0/12,192.0.0.0/24,192.0.2.0/24,192.88.99.0/24,192.168.0.0/16,198.18.0.0/15,198.51.100.0/24,203.0.113.0/24,224.0.0.0/4,239.255.255.250/32,240.0.0.0/4,255.255.255.255/32

# DNS
dns-server = https://1.1.1.1/dns-query,https://cloudflare-dns.com/dns-query,system
fallback-dns-server = https://dns.alidns.com/dns-query,https://doh.pub/dns-query,system
dns-fallback-system = false
dns-direct-system = false
private-ip-answer = false

# IPv6
ipv6 = false
prefer-ipv6 = false

# Connectivity
icmp-auto-reply = true
always-reject-url-rewrite = false

[Proxy Group]
流量信息 = select, policy-regex-filter=SSRDOG|XgCloud
Proxy = select, 🇺🇳自建节点, 🇭🇰香港节点, 🇯🇵日本节点, 🇨🇳台湾节点, 🇸🇬新加坡节点, 🇺🇸美国节点, 手动选择, DIRECT
ChatGPT = fallback, 🇺🇳自建节点, 🇺🇸美国节点, Proxy, url=http://www.gstatic.com/generate_204, interval=300, timeout=5
Google = fallback, 🇺🇳自建节点, Proxy, url=http://latency-test.skk.moe/endpoint, interval=300, timeout=3
HKBank = select, DIRECT, 🇭🇰香港节点, 🇺🇳自建节点
Stock = select, DIRECT, 🇭🇰香港节点, 🇺🇳自建节点
YouTube = fallback, 🇭🇰香港节点, 🇺🇳自建节点, 🇯🇵日本节点, 🇨🇳台湾节点, 🇸🇬新加坡节点, Proxy, url=http://latency-test.skk.moe/endpoint, interval=300, timeout=3
Apple = select, DIRECT, 🇺🇳自建节点, 🇹🇷土耳其节点, 🇺🇸美国节点, Proxy
Microsoft = fallback, DIRECT, 🇺🇳自建节点, Proxy, url=http://latency-test.skk.moe/endpoint, interval=300, timeout=3
Crypto = select, 🇨🇳台湾节点, 🇸🇬新加坡节点, DIRECT
TradingView = fallback, 🇭🇰香港节点, 🇯🇵日本节点, 🇸🇬新加坡节点, 🇺🇳自建节点, Proxy, url=http://latency-test.skk.moe/endpoint, interval=300, timeout=3

手动选择 = select, policy-regex-filter=^(?!.*(?:SSRDOG|XgCloud)).*$
🇺🇳自建节点 = fallback, url=http://latency-test.skk.moe/endpoint, interval=300, timeout=5, policy-regex-filter=DMIT|自建|家宽|Home|DIY
🇭🇰香港节点 = url-test, url=http://latency-test.skk.moe/endpoint, interval=300, tolerance=50, timeout=3, policy-regex-filter=(🇭🇰)|(香港)|(Hong)|(HK)
🇺🇸美国节点 = url-test, url=http://latency-test.skk.moe/endpoint, interval=300, tolerance=50, timeout=3, policy-regex-filter=(🇺🇸)|(美国)|(States)|(US)
🇯🇵日本节点 = url-test, url=http://latency-test.skk.moe/endpoint, interval=300, tolerance=50, timeout=3, policy-regex-filter=(🇯🇵)|(日本)|(Japan)|(JP)
🇨🇳台湾节点 = url-test, url=http://latency-test.skk.moe/endpoint, interval=300, tolerance=50, timeout=3, policy-regex-filter=(🇨🇳 台湾)|(台湾)|(Tai)|(TW)
🇸🇬新加坡节点 = url-test, url=http://latency-test.skk.moe/endpoint, interval=300, tolerance=50, timeout=3, policy-regex-filter=(🇸🇬)|(新加坡)|(Singapore)|(SG)
🇹🇷土耳其节点 = url-test, url=http://latency-test.skk.moe/endpoint, interval=300, tolerance=50, timeout=3, policy-regex-filter=(🇹🇷)|(土耳其)|(Turkey)|(TR)
All = select, policy-regex-filter=.*


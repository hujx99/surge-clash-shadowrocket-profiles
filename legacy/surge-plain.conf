[General]
# 基础网络行为
wifi-assist = false
all-hybrid = true
ipv6 = false
ipv6-vif = auto
udp-priority = false
use-local-host-item-for-proxy = true
show-error-page-for-reject = true
geoip-maxmind-url = https://github.com/Hackl0us/GeoIP2-CN/raw/release/Country.mmdb
skip-proxy = localhost, *.local, captive.apple.com, guzzoni.apple.com, passenger.t3go.cn, wxh.wo.cn, 0.0.0.0/8, 10.0.0.0/8, 17.0.0.0/8, 100.64.0.0/10, 127.0.0.0/8, 169.254.0.0/16, 172.16.0.0/12, 192.0.0.0/24, 192.0.2.0/24, 192.168.0.0/16, 192.88.99.0/24, 198.18.0.0/15, 198.51.100.0/24, 203.0.113.0/24, 224.0.0.0/4, 240.0.0.0/4, 255.255.255.255/32
exclude-simple-hostnames = true
read-etc-hosts = true
test-timeout = 3
internet-test-url = http://connectivitycheck.platform.hicloud.com/generate_204
proxy-test-url = http://latency-test.skk.moe/endpoint

# DNS 解析 —— 明文版
# 1. 国内域名走阿里 / DNSPod 明文 DNS，速度最快、CDN 调度最准
# 2. 境外域名交由代理出站解析（Surge 默认行为），天然规避国内污染
# 3. hijack-dns 拦下 App 硬编码的 53 查询，统一回到 dns-server
# 代价：ISP 能看到明文查询内容；但 SNI / IP 同样暴露，DNS 加密对隐私收益有限
dns-server = 223.5.5.5, 119.29.29.29, 119.28.28.28, 180.76.76.76
hijack-dns = *:53
always-real-ip = *.msftconnecttest.com, *.msftncsi.com, *.srv.nintendo.net, *.stun.playstation.net, xbox.*.microsoft.com, *.xboxlive.com, *.logon.battlenet.com.cn, *.logon.battle.net, *.battlenet.com.cn, *.battlenet.com, *.blzstatic.cn, *.battle.net, stun.l.google.com, stun.*, *.turn.twilio.com, *.stun.twilio.com, stun.syncthing.net, link-ip.nextdns.io

# 本机代理服务监听
http-listen = 0.0.0.0
socks5-listen = 0.0.0.0

# 热点 / 局域网共享
allow-hotspot-access = true
allow-wifi-access = true
proxy-restricted-to-lan = false

# 其他运行参数
udp-policy-not-supported-behaviour = REJECT
http-api-tls = false
http-api-web-dashboard = true
loglevel = notify


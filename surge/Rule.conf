# 国内 DoH 直连，国外 DoH 走代理
# 国内 DNS / 机场节点域名
DOMAIN,dns.alidns.com,DIRECT
DOMAIN,doh.pub,DIRECT
DOMAIN-SUFFIX,xf9pzeslxw.sbs,DIRECT

DOMAIN-SUFFIX,dns.nextdns.io,Proxy
DOMAIN-SUFFIX,dns.adguard-dns.com,Proxy
# 加密 DNS 协议接管
PROTOCOL,DOH,Proxy
PROTOCOL,DOH3,Proxy
PROTOCOL,DOQ,Proxy

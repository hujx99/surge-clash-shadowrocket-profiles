[General]
loglevel = notify
show-error-page-for-reject = true

# ── 基础网络 ──────────────────────────────────────────────
# Wi-Fi 信号弱时不自动切蜂窝，避免绕过 Surge 规则偷跑流量
wifi-assist = false
# 关闭 Wi-Fi + 蜂窝混合模式，保持流量路径可预期
all-hybrid = false
# IPv6 当前环境不稳定，关闭
ipv6 = false // 如无特殊需求不应开启 IPv6，目前网络环境下 IPv6 只会带来问题。
# VIF 层同样禁用 IPv6
ipv6-vif = disabled
# UDP 优先级关闭，避免影响 TCP 稳定性
udp-priority = false

# 使用系统 /etc/hosts 中定义的本地主机项走代理
use-local-host-item-for-proxy = true
# 不代理无点号的简短主机名，避免内网误走代理
exclude-simple-hostnames = true
# 读取系统 /etc/hosts
read-etc-hosts = true

# ── 连通性 & 测速 ─────────────────────────────────────────
test-timeout = 3
# 网络连通性检测：Cloudflare 204，全球可达、延迟低
internet-test-url = http://cp.cloudflare.com/generate_204
# 代理节点测速：Apple 官方测试地址，稳定可靠
proxy-test-url = http://www.apple.com/library/test/success.html

# ── DNS ───────────────────────────────────────────────────
# Tailscale MagicDNS 域名排除加密 DNS，走系统 DNS
encrypted-dns-except-domains = ts.net, tailcc80f6.ts.net
# 直连 DNS：国内 DoH（阿里 / DNSPod）+ 系统兜底
# 用 DoH 替代明文 53，蜂窝/公共 Wi-Fi 下规避运营商抢答与 DNS 劫持
dns-server = https://dns.alidns.com/dns-query, https://doh.pub/dns-query, system
# 加密 DNS 使用国内服务商，iOS 蜂窝环境下访问更稳定
encrypted-dns-server = https://dns.alidns.com/dns-query, https://doh.pub/dns-query
# iOS 保持关闭，统一用国内加密 DNS，减少切换延迟
encrypted-dns-follow-outbound-mode = false
# 劫持所有 53 端口 DNS 请求，防止绕过 Surge DNS
hijack-dns = *:53
# 以下域名强制返回真实 IP，防止 STUN / 游戏 / 微软连通检测被 fake-ip 干扰
always-real-ip = *.msftconnecttest.com, *.msftncsi.com, *.srv.nintendo.net, *.stun.playstation.net, xbox.*.microsoft.com, *.xboxlive.com, *.logon.battlenet.com.cn, *.logon.battle.net, *.battlenet.com.cn, *.battlenet.com, *.blzstatic.cn, *.battle.net, stun.l.google.com, stun.*, *.turn.twilio.com, *.stun.twilio.com, stun.syncthing.net, link-ip.nextdns.io

# ── 代理跳过（应用层） ────────────────────────────────────
# 本地回环、内网段、运营商特殊域名、各类保留地址不走代理
skip-proxy = localhost, *.local, captive.apple.com, guzzoni.apple.com, passenger.t3go.cn, wxh.wo.cn, 0.0.0.0/8, 10.0.0.0/8, 100.64.0.0/10, 127.0.0.0/8, 169.254.0.0/16, 172.16.0.0/12, 192.0.0.0/24, 192.0.2.0/24, 192.168.0.0/16, 192.88.99.0/24, 198.18.0.0/15, 198.51.100.0/24, 203.0.113.0/24, 224.0.0.0/4, 240.0.0.0/4, 255.255.255.255/32

# ── 本机代理监听 ──────────────────────────────────────────
# 仅监听本机，不对外暴露
http-listen = 127.0.0.1
socks5-listen = 127.0.0.1
# 不允许热点共享代理（iOS 特有）
allow-hotspot-access = false
allow-wifi-access = true

# ── 其他行为 ──────────────────────────────────────────────
# 节点不支持 UDP 时直接拒绝，避免流量绕过规则
udp-policy-not-supported-behaviour = REJECT
# Web Dashboard 暂不启用
http-api-tls = false
http-api-web-dashboard = false
# GeoIP 数据库：CN 精简版
geoip-maxmind-url = https://github.com/Hackl0us/GeoIP2-CN/raw/release/Country.mmdb

# ============================================================
# 以下各节通过外部文件模块化管理，保持主配置文件简洁
# ============================================================
external-controller-access = asdf1233@0.0.0.0:6170

[Proxy Group]
#!include Node.conf, Proxy.conf

[Rule]
#!include Rule.conf

[Host]
#!include Proxy.conf

[URL Rewrite]
#!include Proxy.conf

[Header Rewrite]
#!include Proxy.conf

[MITM]
#!include Proxy.conf

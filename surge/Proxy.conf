# 💗节点总表，供其他策略组通过 include-other-group=All 引用

[Host]
# --- 0. DoH 服务器 bootstrap（避免"要查 DoH 得先查 DoH"的鸡蛋问题）---
# encrypted-dns-server 指向 DoH 主机名时，Surge 需要先把这两个主机名解析出来；
# 固定 IP 可消除对系统 DNS 的依赖，即使系统 DNS 被劫持 DoH 也能直接起来
dns.alidns.com = 223.5.5.5, 223.6.6.6
doh.pub = 1.12.12.12, 120.53.53.53

# --- 1. 自建节点入口（静态映射绕过 DNS，VPS IP 变动需手动更新）---
xray.doveahu.online = 64.186.251.37

# --- 2. 机场节点域名（国内 DoH 解析）---

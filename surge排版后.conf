[General]
# 基础网络行为
wifi-assist = false
all-hybrid = true
ipv6 = false
show-error-page-for-reject = true
geoip-maxmind-url = https://github.com/Hackl0us/GeoIP2-CN/raw/release/Country.mmdb
skip-proxy = localhost, *.local, captive.apple.com, guzzoni.apple.com, passenger.t3go.cn, *.ccb.com, wxh.wo.cn, *.abcchina.com, *.abcchina.com.cn, 0.0.0.0/8, 10.0.0.0/8, 17.0.0.0/8, 100.64.0.0/10, 127.0.0.0/8, 169.254.0.0/16, 172.16.0.0/12, 192.0.0.0/24, 192.0.2.0/24, 192.168.0.0/16, 192.88.99.0/24, 198.18.0.0/15, 198.51.100.0/24, 203.0.113.0/24, 224.0.0.0/4, 240.0.0.0/4, 255.255.255.255/32
exclude-simple-hostnames = true
read-etc-hosts = true
test-timeout = 3
internet-test-url = http://connectivitycheck.platform.hicloud.com/generate_204
proxy-test-url = http://latency-test.skk.moe/endpoint

# DNS 解析
# 这套写法偏向“降低 DNS 泄露观感”：
# 1. 全局 DoH 改为海外 IP 直连，避免先解析 DoH 域名再自举。
# 2. `encrypted-dns-follow-outbound-mode = true` 让 DoH 连接也跟随当前出站模式和规则。
# 3. Surge Mac 仍需手动开启 Enhanced Mode；否则浏览器 / App 自带的 DoH、HTTPDNS 仍可能绕过此文件。
dns-server = 1.1.1.1, 8.8.8.8
encrypted-dns-server = https://1.1.1.1/dns-query, https://8.8.8.8/dns-query
encrypted-dns-follow-outbound-mode = true
# 仅能劫持 53 端口明文 DNS；加密 DNS 仍要靠下方规则接管。
hijack-dns = *:53
always-real-ip = *.msftconnecttest.com, *.msftncsi.com, *.srv.nintendo.net, *.stun.playstation.net, xbox.*.microsoft.com, *.xboxlive.com, *.logon.battlenet.com.cn, *.logon.battle.net, *.battlenet.com.cn, *.battlenet.com, *.blzstatic.cn, *.battle.net, stun.l.google.com, stun.*, *.turn.twilio.com, *.stun.twilio.com, stun.syncthing.net, link-ip.nextdns.io

# 本机代理服务监听
# 当前监听在 `0.0.0.0`，局域网设备可直接连入；若只给本机用可改成 `127.0.0.1`。
http-listen = 0.0.0.0
socks5-listen = 0.0.0.0

# 热点 / 局域网共享
# `proxy-restricted-to-lan = false` 表示不限制为同一子网访问，按你的使用场景保留。
allow-hotspot-access = true
allow-wifi-access = true
proxy-restricted-to-lan = false

# 其他运行参数
# UDP 命中不支持 UDP 转发的策略时直接拒绝，避免无感直连。
udp-policy-not-supported-behaviour = REJECT
http-api-tls = false
http-api-web-dashboard = true
loglevel = notify

[Ponte]
# Ponte / 桥接场景默认使用的上游策略组名称
server-proxy-name = 自建节点

[Proxy Group]
